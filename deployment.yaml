apiVersion: apps/v1
kind: Deployment
metadata:
  name: meditrack-backend
  namespace: default
  labels:
    app: meditrack-backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meditrack-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime: new pods must start before old ones stop
  template:
    metadata:
      labels:
        app: meditrack-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "5000"
    spec:
      containers:
        - name: meditrack-backend
          image: yourdockerhubuser/meditrack-backend:IMAGE_TAG_PLACEHOLDER
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: APP_VERSION
              value: "IMAGE_TAG_PLACEHOLDER"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meditrack-frontend
  namespace: default
  labels:
    app: meditrack-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meditrack-frontend
  template:
    metadata:
      labels:
        app: meditrack-frontend
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-files
              mountPath: /usr/share/nginx/html
      volumes:
        - name: frontend-files
          configMap:
            name: meditrack-frontend-files
