version: '3.8'

services:

  # ── MediTrack Backend API ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    container_name: meditrack-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - APP_VERSION=1.0.0
    restart: unless-stopped
    networks:
      - meditrack-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Frontend (Nginx serving static HTML) ──────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: meditrack-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - meditrack-net

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: meditrack-prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - meditrack-net

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: meditrack-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - meditrack-net

networks:
  meditrack-net:
    driver: bridge

volumes:
  grafana-storage:
