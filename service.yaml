apiVersion: v1
kind: Service
metadata:
  name: meditrack-backend-svc
  namespace: default
spec:
  selector:
    app: meditrack-backend
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: meditrack-frontend-svc
  namespace: default
spec:
  selector:
    app: meditrack-frontend
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
